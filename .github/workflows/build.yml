name: Web CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Focused tests
        run: |
          pnpm run test:admin-role-resolution-diagnostics
          pnpm run test:admin-post-login-routing
          pnpm run test:google-pkce-storage
          pnpm run test:password-update-error
          pnpm run test:password-method-status
          pnpm run test:identity-auth-foundation
          pnpm run test:health-time-range
          node scripts/test-sprint-52_1_copy_polish.mjs

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Resolve build identity
        id: build-meta
        run: echo "build_time=$(git show -s --format=%cI HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          NEXT_PUBLIC_GIT_SHA: ${{ github.sha }}
          NEXT_PUBLIC_BUILD_TIME: ${{ steps.build-meta.outputs.build_time }}
          NEXT_PUBLIC_APP_ENV: ${{ github.ref_name == 'main' && 'production' || 'development' }}
          NEXT_PUBLIC_SITE_URL: ${{ github.ref_name == 'main' && 'https://www.engage7.ie' || 'https://dev.engage7.ie' }}
          NEXT_PUBLIC_API_BASE_URL: ${{ github.ref_name == 'main' && 'https://api.engage7.ie' || 'https://aca-engage7-api-dev-neu.nicewater-a1f85a44.northeurope.azurecontainerapps.io' }}
          ENGAGE7_API_BASE_URL: ${{ github.ref_name == 'main' && 'https://api.engage7.ie' || 'https://aca-engage7-api-dev-neu.nicewater-a1f85a44.northeurope.azurecontainerapps.io' }}
        run: pnpm build
